name: Scrape standvirtual

on:
  schedule:
    # Daily at 05:30 UTC (06:30/07:30 Lisbon depending on DST).
    # Scrapes the FULL catalog (~1,340 pages); the scraper self-terminates at the
    # true end, so the high page cap just leaves headroom for catalog growth.
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      pages:
        description: "Pages to scrape (full catalog ~1340; type a small number to test)"
        required: false
        default: "1500"
      max_price:
        description: "Optional max price filter (EUR)"
        required: false
        default: ""

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # A full-catalog scrape is ~80 min (1,340 pages, politely spaced); 120 leaves
    # buffer for retries. Well under GitHub's 6h job ceiling.
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7

      # Version comes from package.json's "packageManager" field — don't set it
      # here too, or action-setup errors on the duplicate (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Run scraper
        run: |
          PAGES="${{ github.event.inputs.pages || '1500' }}"
          MAXP="${{ github.event.inputs.max_price }}"
          if [ -n "$MAXP" ]; then
            pnpm scrape -- --pages "$PAGES" --max-price "$MAXP"
          else
            pnpm scrape -- --pages "$PAGES"
          fi
